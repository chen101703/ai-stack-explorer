<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>The AI Stack — Anatomy Teardown</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Sometype+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080e;--panel:#0d1322;--panel2:#111a2e;--line:#1d2c47;--line2:#274069;
  --ink:#e8eefb;--dim:#9bb0d4;--faint:#62759b;--cyan:#39e1ff;--cyandeep:#0a8fb5;
  --gold:#ffce54;--golddeep:#c9952a;--warm:#ff9f43;--teal:#3fd6c7;--violet:#a98bff;--grey:#7d8db0;--green:#4fe08a;--pink:#ff7fae;
  --mono:"Sometype Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --disp:"Chakra Petch",ui-monospace,"SF Mono",monospace;
  --body:-apple-system,system-ui,"SF Pro Text",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;overflow:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(1100px 650px at 72% -10%,rgba(57,225,255,.10),transparent 60%),radial-gradient(800px 500px at 4% 110%,rgba(255,206,84,.05),transparent 55%),linear-gradient(0deg,#06080e,#0a0e18)}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:linear-gradient(rgba(39,64,105,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(39,64,105,.16) 1px,transparent 1px);
  background-size:32px 32px;-webkit-mask-image:radial-gradient(120% 120% at 50% 28%,#000 55%,transparent 100%);mask-image:radial-gradient(120% 120% at 50% 28%,#000 55%,transparent 100%)}
#app{position:relative;z-index:2;height:100%;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:14px;padding:12px 20px 10px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(13,19,34,.85),rgba(13,19,34,.3));backdrop-filter:blur(8px)}
.brand{display:flex;flex-direction:column;gap:2px}
.brand h1{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.13em;display:flex;align-items:center;gap:9px}
.brand h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);animation:pulse 2.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.brand .sub{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.05em;text-transform:uppercase}
.brand .sub b{color:var(--gold)}
.spacer{flex:1}
.tool{font-family:var(--mono);font-size:11px;letter-spacing:.03em;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;border:1px solid var(--line2);background:var(--panel);color:var(--dim);padding:8px 12px;border-radius:9px;transition:.15s;white-space:nowrap}
.tool:hover{border-color:var(--cyandeep);color:var(--ink)}
.tool.on{border-color:var(--golddeep);color:var(--gold);background:rgba(255,206,84,.07)}
#search{font-family:var(--mono);font-size:12px;background:var(--panel);border:1px solid var(--line2);color:var(--ink);padding:8px 12px;border-radius:9px;width:170px;outline:none;transition:.15s}
#search:focus{border-color:var(--cyandeep);width:210px}
#search::placeholder{color:var(--faint)}
.search-wrap{position:relative}
#searchResults{position:absolute;top:42px;right:0;width:320px;max-height:60vh;overflow:auto;z-index:40;background:var(--panel2);border:1px solid var(--line2);border-radius:11px;box-shadow:0 18px 50px -20px #000;display:none;padding:6px}
#searchResults.show{display:block}
.sr{padding:8px 10px;border-radius:8px;cursor:pointer;display:flex;gap:9px;align-items:baseline}
.sr:hover{background:rgba(57,225,255,.08)}
.sr .tk{font-family:var(--mono);font-weight:700;color:var(--cyan);font-size:12px;min-width:72px}
.sr .nm{font-size:11.5px;color:var(--dim);flex:1}
.sr .pth{font-family:var(--mono);font-size:9px;color:var(--faint)}
.crumbs{display:flex;align-items:center;gap:2px;padding:8px 20px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.crumbs::-webkit-scrollbar{display:none}
.crumb{color:var(--faint);cursor:pointer;padding:4px 9px;border-radius:7px;transition:.14s}
.crumb:hover{color:var(--ink);background:var(--panel)}
.crumb.here{color:var(--cyan);background:rgba(57,225,255,.08)}
.crumb .lv{color:var(--faint);font-size:9px;margin-right:5px}
.sep{color:var(--line2)}
main{flex:1;display:flex;min-height:0}
.stage{flex:1;display:flex;flex-direction:column;min-width:0}
.stage-head{padding:13px 22px 6px}
.sh-top{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.sh-title{font-family:var(--disp);font-weight:700;font-size:23px;letter-spacing:.02em}
.sh-scale{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--cyan);text-shadow:0 0 18px rgba(57,225,255,.35);margin-left:auto}
.sh-scale .bs{font-size:10px;color:var(--faint);display:block;text-align:right;font-weight:400}
.sh-tag{font-family:var(--mono);font-size:11.5px;color:var(--gold);margin-top:6px}
.sh-hint{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:4px;letter-spacing:.04em}
.scene{flex:1;min-height:0;padding:4px 14px 12px}
svg.stage-svg{width:100%;height:100%;display:block}
/* cells */
.cell{cursor:pointer}
.cell .cface{transition:.16s}
.cell:hover .cface{filter:brightness(1.3)}
.cell .ring{fill:none;stroke-width:2;opacity:0;transition:.16s}
.cell:hover .ring{opacity:.65}.cell.sel .ring{opacity:1;stroke-width:2.5}
.cell.dim{opacity:.3;filter:saturate(.5)}
.cell.overlay .cface{opacity:.5;stroke-dasharray:2 4}
.leader{stroke:rgba(57,225,255,.45);stroke-width:1.2;fill:none}
.anchor{fill:var(--cyan);stroke:#06080e;stroke-width:1}
.illuslbl{font-family:var(--mono);fill:var(--faint)}
.cell .clabel{font-family:var(--disp);font-weight:600;pointer-events:none}
.cell .cpct{font-family:var(--mono);font-weight:700;pointer-events:none}
.cell .cco{font-family:var(--mono);pointer-events:none;fill:var(--faint)}
.cell .cdrill{font-family:var(--mono);pointer-events:none;opacity:0;transition:.15s}
.cell:hover .cdrill{opacity:1}
.gemstar{fill:var(--gold);pointer-events:none;filter:drop-shadow(0 0 5px var(--gold))}
.arrow{stroke:var(--line2);stroke-width:2;fill:none;marker-end:url(#ah)}
.framelbl{font-family:var(--mono);fill:var(--faint);pointer-events:none}
/* capex */
.capex{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px}
.capex .big{font-family:var(--disp);font-weight:700;font-size:64px;color:var(--cyan);text-shadow:0 0 30px rgba(57,225,255,.4)}
.capex .lbl{font-family:var(--mono);font-size:13px;color:var(--dim);letter-spacing:.05em}
.capex .bars{display:flex;gap:10px;align-items:flex-end;height:130px;margin-top:6px}
.capex .bar{width:74px;display:flex;flex-direction:column;align-items:center;gap:5px}
.capex .bar .b{width:46px;background:linear-gradient(180deg,var(--cyandeep),#0c2030);border:1px solid var(--cyandeep);border-radius:5px 5px 0 0}
.capex .bar .tk{font-family:var(--mono);font-size:11px;color:var(--cyan);font-weight:600}
.capex .bar .bval{font-family:var(--mono);font-size:9.5px;color:var(--dim)}
.capex .caplbl{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase}
.capex .caphint{font-family:var(--mono);font-size:10.5px;color:var(--gold);margin-top:4px;max-width:560px;text-align:center;line-height:1.5}
.capex .enter{margin-top:10px;font-family:var(--mono);font-size:14px;color:var(--cyan);border:1px solid var(--cyandeep);background:rgba(57,225,255,.06);border-radius:11px;padding:14px 26px;cursor:pointer;transition:.15s;letter-spacing:.04em}
.capex .enter:hover{background:rgba(57,225,255,.16);color:#fff}
/* side */
.side{width:348px;border-left:1px solid var(--line);background:rgba(10,14,24,.6);overflow:auto;flex-shrink:0;padding:15px 16px}
.side::-webkit-scrollbar{width:8px}.side::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px}
.sb-h{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:2px 0 10px;display:flex;align-items:center;gap:8px}
.sb-h::before{content:"";width:14px;height:1px;background:var(--cyan)}
.ptitle{font-family:var(--disp);font-weight:700;font-size:18px;line-height:1.12}
.pscale{font-family:var(--mono);font-weight:700;font-size:12.5px;color:var(--cyan);margin-top:3px}
.ppct{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--gold);border:1px solid var(--golddeep);border-radius:6px;padding:2px 8px;margin-top:8px;background:rgba(255,206,84,.05)}
.ptag{font-family:var(--mono);font-size:11.5px;color:var(--gold);margin-top:9px;line-height:1.5}
.pdesc{font-size:12.5px;color:var(--dim);line-height:1.6;margin-top:8px}
.take{font-size:12.5px;line-height:1.6;color:var(--ink);border-left:2px solid var(--golddeep);padding-left:11px;margin-top:12px}
.take b{color:var(--gold)}
.drill{display:block;width:100%;text-align:center;font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--cyan);border:1px solid var(--cyandeep);background:rgba(57,225,255,.06);border-radius:9px;padding:11px;margin:13px 0 4px;cursor:pointer;transition:.15s}
.drill:hover{background:rgba(57,225,255,.15);color:#fff}
.co{background:#0c1322;border:1px solid var(--line2);border-radius:10px;padding:10px 12px;margin:8px 0}
.co.gem{border-color:var(--golddeep);background:linear-gradient(160deg,rgba(255,206,84,.05),#0c1322)}
.co-h{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.co-h .tk{font-family:var(--mono);font-weight:700;font-size:13.5px;color:var(--cyan)}
.co.gem .co-h .tk{color:var(--gold)}
.co-h .mkt{font-family:var(--mono);font-size:9px;color:var(--faint);border:1px solid var(--line2);border-radius:4px;padding:1px 5px}
.co-h .nm{font-size:11.5px;color:var(--dim);margin-left:auto}
.co .role{font-size:11px;color:var(--dim);line-height:1.5;margin:5px 0 0}
.co .stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.co .st{display:flex;flex-direction:column;font-family:var(--mono);font-size:11px;font-weight:600}
.co .st b{font-weight:400;font-size:8px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
.m-mono{color:var(--gold)}.m-duo{color:var(--warm)}.m-oli{color:var(--teal)}.m-frag{color:var(--cool,#5b78b8)}
.co .angle{font-size:11px;line-height:1.5;color:var(--ink);border-left:2px solid var(--golddeep);padding-left:9px;margin-top:6px}
.co .angle span{display:block;font-family:var(--mono);font-size:8px;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.co .nml{font-size:13px;color:var(--ink);font-weight:600;margin:1px 0 0;letter-spacing:.02em}
.momentum{display:flex;gap:11px;align-items:flex-start;margin-top:11px;padding:9px 11px;border:1px solid var(--line2);border-radius:9px;background:rgba(57,225,255,.03)}
.mo-arrow{font-family:var(--mono);font-size:22px;font-weight:700;line-height:.9}
.mo-lbl{font-family:var(--mono);font-size:8px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em}
.mo-rate{font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:600;margin-top:2px}
.mo-driver{font-size:11px;color:var(--dim);line-height:1.45;margin-top:3px}
.prow{border:1px solid var(--line2);border-radius:10px;padding:10px 12px;margin:8px 0;cursor:pointer;transition:.14s}
.prow:hover{border-color:var(--cyandeep);background:rgba(57,225,255,.04)}
.prow.gem{border-color:var(--golddeep);background:linear-gradient(160deg,rgba(255,206,84,.04),transparent)}
.prow-h{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.prow-lab{font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink);line-height:1.2}
.prow.gem .prow-lab{color:var(--gold)}
.prow-meta{font-family:var(--mono);font-size:11px;color:var(--faint);white-space:nowrap}
.prow-what{font-size:11.5px;color:var(--dim);line-height:1.5;margin-top:5px}
.prow-drv{font-size:11px;color:var(--ink);line-height:1.45;margin-top:7px;border-left:2px solid var(--green);padding-left:8px}
.prow-drv span{display:block;font-family:var(--mono);font-size:8px;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.prow-go{font-family:var(--mono);font-size:10px;color:var(--cyan);margin-top:7px}
.chain-h{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin:14px 0 7px;display:flex;align-items:center;gap:7px;opacity:.95}
.chain-h span{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.co .crole{font-family:var(--mono);font-size:7.5px;text-transform:uppercase;letter-spacing:.06em;border:1px solid var(--line2);border-radius:4px;padding:1px 5px;color:var(--dim)}
.gem-row{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer;align-items:baseline}
.gem-row:hover{background:rgba(255,206,84,.05)}
.gem-row .g-tk{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:12px;min-width:76px}
.gem-row .g-why{font-size:11px;color:var(--dim);line-height:1.4}
.gem-row .g-pth{font-family:var(--mono);font-size:9px;color:var(--faint);margin-top:2px}
.src{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:12px;line-height:1.6}
.legend{padding:8px 20px;border-top:1px solid var(--line);display:flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:9.5px;color:var(--faint);background:rgba(10,14,24,.5)}
.lg{display:flex;align-items:center;gap:5px}.sw{width:10px;height:10px;border-radius:3px}
@media (max-width:880px){
  main{flex-direction:column}.side{width:auto;border-left:none;border-top:1px solid var(--line);max-height:none}
  html,body{overflow:auto}#app{height:auto;min-height:100%}
  .scene{height:58vh}.legend{display:none}.sh-title{font-size:19px}.sh-scale{font-size:15px}
  header{flex-wrap:wrap}#search{width:130px}
}
</style>
</head>

es WFE intensity per wafer ~15-30% and ALD/precursor consumption 40-60% versus FinFET, with incremental dollars flowing to deposition (AMAT, ASM International, Lam, TEL), to metrology that must hold sub-angstrom CD on buried sheets (KLA, Onto), and to a concentrated, mostly Japanese/Korean materials layer (high-k hafnium precursors, work-function metal precursors, ultra-pure etch chemistries). The value framing: this node is not a separate revenue line you can buy directly — it is the transistor-build slice of TSMC/Samsung/Intel wafer cost, captured by the equipment and materials suppliers whose tools and chemistries are physically required to print each sheet. NOTE (verification): base Rubin is N3P FinFET — GAA nanosheets arrive at N2 (TSMC volume ~4Q25/2026), so this node is forward-looking for the Rubin-Ultra/Feynman generation. The hidden alpha sits in small-cap Asian precursor and niche-tool names (Hansol Chemical, DNF/Soulbrain, Adeka, Tri Chemical, HPSP, Park Systems) that are single-digit-billion market caps yet sole-qualified on flows growing structurally with every GAA node.", "investmentTakeaway": "Own the GAA transition as a per-wafer content story, not a foundry story: the transistor architecture change is a forced WFE and materials super-cycle that AMAT, ASM International (ASMI), Lam and TEL capture regardless of which foundry wins. The single sharpest under-followed name is ASM International — over 55% ALD share and over 55% share specifically at the 2nm GAA node, the purest beneficiary of FinFET-to-GAA which lifts ALD spend roughly 30% per wafer; it is the structural twin to ASML's EUV monopoly but at a fraction of the attention. The hidden-monopoly alpha is in Asian materials micro-caps consensus ignores: HPSP (403870-KS) holds a roughly 100% monopoly on high-pressure hydrogen annealing that GAA's all-around HKMG makes mandatory; Hansol Chemical (014680-KS), DNF (092070-KS, being absorbed by Soulbrain 357780-KS), Adeka (4401-T) and unlisted Tri Chemical are qualified hafnium/zirconium and work-function-metal precursor suppliers whose volume rises 40-60% per GAA wafer; Park Systems (140860-KS) and Onto Innovation (ONTO) sell the AFM/OCD metrology GAA buried-sheet CD control now requires. What consensus misses: it treats N2 as a TSMC foundry-margin event, when the real durable monopolies are one layer below — the precursor and niche-tool choke points that gate every nanosheet and cannot be designed around in under 18 months.", "spineChild": null, "parts": [{"id": "tr-nanosheet", "label": "Nanosheet Channel", "kind": "channel", "region": "center", "drill": false, "valuePct": 22, "valueUSD": null, "note": "The stacked Si/SiGe superlattice that becomes the channel: epi-grown alternating layers, then SiGe is selectively etched away to release free-standing silicon nanosheets. Key dynamic — selective Si:SiGe isotropic etch + the epi superlattice are the two hardest, most concentrated new steps GAA adds vs FinFET; ASM International and AMAT own the epi reactors, Lam and TEL own the atomic-layer selective etch.", "companies": [{"ticker": "ASML", "name": "ASML Holding", "market": "EU", "chainRole": "equipment", "role": "EUV/High-NA litho patterning every GAA layer below 30nm", "marketShare": "100% EUV", "moat": "Sub-7nm patterning monopoly enabling nanosheet definition", "niche": false, "aiExposure": "very high", "contentValue": "high", "investmentAngle": "Every nanosheet layer printed on ASML EUV"}, {"ticker": "ASM-NA", "name": "ASM International", "market": "EU", "chainRole": "equipment", "role": "Epitaxy (Intrepid XP) for Si/SiGe superlattice + ALD", "marketShare": "~55% single-wafer ALD", "moat": "Epi + ALD leadership for the superlattice stack — GAA's core enabler", "niche": false, "aiExposure": "very high", "contentValue": "very high", "investmentAngle": "Highest-leverage GAA winner; superlattice epi + ALD intensity"}, {"ticker": "AMAT", "name": "Applied Materials", "market": "US", "chainRole": "equipment", "role" (260 TB/s all-to-all across the rack). The tray connects to the 18 compute trays through a copper cable backplane of ~5,184 twinax cables (~two miles of cable) terminated by Amphenol Paladin HD2 / SkewClear EXD connectors. The value here is dominated by NVIDIA's own silicon, but every dollar of incremental copper, twinax and connector content is captured by a tight Amphenol-led connector oligopoly plus an Asian cable-assembly and board ecosystem. Note: NVIDIA folds NVSwitch silicon into server/node cost — so most of this node's dollars are an NVDA capture, and the investable third-party content is the cabling, connectors and the (skeleton-missing) NVSwitch-board PCB/CCL layer. VERIFIED: 9 switch trays, 4 ASICs/tray = 36/rack, ~5,000 copper cables, 260 TB/s — CONFIRMED (NVIDIA blog).", "investmentTakeaway": "Own the cabling/connector layer, not the switch silicon — the ASIC value is 100% NVDA-captured and already in the GPU thesis, but the copper backplane is where third-party content compounds and consensus under-models it. The cleanest single-source monopoly is Amphenol (APH) — Paladin HD2 / SkewClear EXD, ~$100-120k content/rack, with TE Connectivity (TEL) as the only qualified corporate-level backup (a 4-player connector oligopoly, not a true monopoly). The under-followed alpha is the Asian cable-assembly tier: BizLink (3665-TW) ParaLink twinax, Luxshare (002475-CH), and board-to-board specialist Lotes (3533-TW) / Foxconn FIT. The structural watch-item: NVIDIA's copper-stays-in-rack stance is durable through Rubin/Rubin Ultra (all-copper roadmap to 2028); the bear case is the eventual scale-up CPO transition (Kyber/Feynman 2028+).", "spineChild": null, "parts": [{"id": "nvs-switch-asic", "label": "NVSwitch ASIC", "kind": "switch", "drill": false, "valuePct": 62, "valueUSD": null, "note": "The NVLink6 Switch ASIC — 36 per rack (9 trays x 4), monolithic TSMC N3P die, 36x 400G bi-di SerDes, XBAR + SHARP in-network compute, 28.8 Tb/s aggregate. VERIFIED 4 ASICs/tray ty expansion needed by CY2027), connectors ~20% short. NVIDIA invested ~$2B each into Lumentum and Coherent (~$4B total, Mar 2026) to lock laser capacity — the smoking-gun signal that lasers, not modules, are the chokepoint. The contrarian insight consensus gets backwards: co-packaged optics is laser-ADDITIVE because NVIDIA's DWDM CPO uses 8 wavelengths times 32 Gb/s, so each CPO engine needs MORE dedicated laser channels per switch. The module-assembly layer is commoditizing (Chinese vendors Innolight + Eoptolink hold ~60% of NVDA's 800G module assembly at ~45% gross margins), while value concentrates upstream in lasers and the optical DSP.", "investmentTakeaway": "Own the upstream constraint, rent the assembler. The single tightest physical bottleneck in AI is the CW/EML laser: ~30% short, ~50% of every module's BOM, made by only ~5 players, with NVDA's ~$4B Lumentum+Coherent lockup as proof. LITE (Lumentum) is the purest expression: #1 Western InP EML and the only supplier shipping 200G/lane EML at volume for 1.6T, but +998% 1Y makes it an entry-discipline trade. COHR (Coherent) is the dual-chokepoint play, both transceivers AND lasers, vertically integrated through its own 6-inch InP fab in Sherman TX. The hidden niche alpha is in Japan: 5802-T (Sumitomo Electric) is the only fully vertically-integrated optical player on earth (InP substrate to CW LD to MT ferrule to fiber to cable), and its disclosed CW-LD share trajectory 24% to 69% by 2028 is the under-appreciated 2027+ threat to LITE's moat. On the DSP side, MRVL (Marvell) quietly owns ~70% of optical DSP. Consensus crowds the laser names and underrates the ferrule chokepoint (private US Conec, Kyocera/Adamant in ceramic LC) and the linear-drive (LPO) bear case that could eliminate the DSP entirely.", "spineChild": null, "parts": [{"id": "op-module", "label": "Transceiver Module (800G/1.6T)", "kind": "optics", "drill": false, "valuePct": 48, "valueUSD": null, "note": "The finished 800G/1.6T pluggable transceiver (OSFP/QSFP-DD), an assembly of laser + DSP + optics + ferrule. ASP $360-450 (800G SR/LR) to $1,300-2,000 (1.6T); assembly is the commoditizing layer where Chinese vendors win on cost base, but it is ~30% short overall (MW Eureka: tightest component). ESTIMATE basis: ~48% of optics-node value. Value leaking UP to lasers/DSP and post-2027 sideways to CPO engines.", "companies": [{"ticker": "300308-SZ", "name": "Zhongji Innolight", "market": "CN", "role": "World #1 optical module maker; ~35% global 800G share, leads NVDA 800G/1.6T pluggable assembly", "marketShare": "~35% global 800G; #1 for several years (LightCounting)", "moat": "oligopoly - scale + EML supply secured + China cost base; but assembly is the least-defensible layer", "niche": false, "aiExposure": "very high", "contentValue": "1Q26 rev Rmb19.5bn +192% YoY, GPM 46.06% (+9.36pp)", "investmentAngle": "Cleanest pure-play on module VOLUME but +1,141% 1Y, 37x 2026E P/E, ChiNext access friction + US export-control tail. Wiki 3/5 WATCH; own the laser upstream instead unless you have A-share access.", "nameLocal": "中际旭创"}, {"ticker": "300502-SZ", "name": "Eoptolink Technology", "market": "CN", "role": "World #3 module maker; ~half of NVDA's incremental 800G self-produced modules alongside Innolight; LPO low-power specialist", "marketShare": "Innolight+Eoptolink ~60% of NVDA 800G module assembly", "moat": "oligopoly - agile manufacturing + LPO design edge; 800G LPO at ~45% GM", "niche": true, "aiExposure": "very high", "contentValue": "2025 rev Rmb24.84bn +187% YoY", "investmentAngle": "The #2 China assembler NVDA is dual-sourcing to de-risk Innolight; LPO leadership is option value if linear-drive displaces DSP. Niche A-share, access-constrained and parabolic.", "nameLocal": "新易盛"}, {"ticker": "COHR", "name": "Coherent Corp", "market": "US", "role": "Only fully vertically-integrated independent Western transceiver maker (InP material to SiPh to module); ~25% global transceiver share, leads telecom 400ZR/800Z es entry. Watch Sumitomo CW-LD encroachment 2027+."}, {"ticker": "COHR", "name": "Coherent Corp", "market": "US", "role": "#2 Western laser + only integrated maker doing own 6-inch InP (Sherman TX) to SiPh to module; both transceivers AND lasers", "marketShare": "major CW/EML supplier; ~25% transceiver volume leader", "moat": "oligopoly - vertical integration into lasers (II-VI heritage) is an advantage in a shortage vs assemblers who source externally", "niche": false, "aiExposure": "very high", "contentValue": "FY25 rev ~$5.8B +23%; 6-inch InP line is one of the most advanced steps in the chain", "investmentAngle": "Dual chokepoint: if laser supply does not 2x, the transceiver shortage cannot resolve, and COHR owns both. NVDA invested ~$2B. Cheaper re-rating setup than LITE (debt discount)."}, {"ticker": "6503-T", "name": "Mitsubishi Electric", "market": "JP", "role": "Major Japanese EML/CW laser supplier, one of the ~5 global volume InP laser makers", "marketShare": "top-3 global EML alongside LITE/Sumitomo", "moat": "oligopoly - InP fab + long optical-device heritage; large balance sheet to expand capacity", "niche": true, "aiExposure": "medium (buried in a huge conglomerate)", "contentValue": "optical-device segment small % of group rev", "investmentAngle": "Hidden EML exposure inside a multi-trillion-yen industrial, the capacity expansion that could pressure LITE pricing if it outpaces transceiver demand. Diluted play, a key supply-side swing factor.", "nameLocal": "三菱電機"}, {"ticker": "5802-T", "name": "Sumitomo Electric", "market": "JP", "role": "Vertically-integrated laser leader, industry-highest 19dBm tunable LD for 800G coherent; 6-inch InP substrate mass-production-ready; CW-LD for SiPh/CPO", "marketShare": "CW-LD chip share 24% (2024) to 45% (2026) to 69% (2028); top-3 EML", "moat": "vertical-integration monopoly - InP substrate to laser to ferrule to fiber to cable, unique at scale", "niche": true, "aiExposure": "high", "contentValue": "Info-Comm OPM 4  ~35%, Eoptolink #3)", "SemiAnalysis optical DSP model (MRVL ~70%)"], "cagr3yr": "35-55% (est)"}, "networking-fabric": {"id": "networking-fabric", "title": "Network / Optical Fabric", "layout": "stack", "scaleLabel": "~5-10% of IT spend", "valueBasis": "scale-out fabric", "tagline": "Stitching racks into a cluster — and the upstream laser shortage that gates it.", "narrative": "Networking/optical fabric is the scale-out plumbing that stitches racks into a cluster — ~5-10% of IT spend and ~9% of facility power, usually nested inside the compute bucket. Two architectures coexist: NVIDIA's proprietary NVLink+InfiniBand/Spectrum stack (CPO-native) and open Ethernet built on Broadcom Tomahawk/Marvell Teralynx silicon plus pluggable optics from Arista/white-box vendors. The value migrates UP the stack as speeds step 400G->800G->1.6T: each Rubin GPU carries 1-2 scale-out transceivers (~$1-3.5k/GPU merchant), and laser content is ~50% of every module's BOM. The single tightest physical constraint in the ENTIRE AI supply chain lives here — CW/EML lasers are ~30% short, made by only ~5 players, with 24+ month InP fab lead times — which is why NVIDIA put ~$2B each into Lumentum and Coherent (~$4B, Mar 2026) to lock laser capacity. The contrarian insight consensus gets backwards: co-packaged optics is laser-ADDITIVE (DWDM = more laser channels per switch), so the laser makers get MORE important under CPO, not obsoleted. Below the headline US names sits a deep bench of under-followed Asian choke points — US Conec's MMC/MT-ferrule standard, Sumitomo's vertical InP-to-cable stack, and Taiwan/China module assemblers — where the niche alpha hides.", "investmentTakeaway": "Own the UPSTREAM constraint, not the commoditizing module assembler. The chain's single tightest bottleneck is the CW/EML laser (~30% short, ~5 makers, 24mo InP lead times) — so LITE (#1 Western EML, only volume 200G/lane shipper) and COHR (dual transceiver+laser exposure) are the purest expressions, both with NVDA's ~$4B lock-up as the smoking gun. The under-priced second-order winner is the optical DSP duopoly: MRVL (~70% optical DSP share, only it ships 1.6T Ara at volume) gates every pluggable module regardless of which assembler wins. The hidden monopolies sit in Asia/connectors: US Conec (private — MMC/MT-ferrule standard everyone licenses), 5802-T Sumitomo (only full-stack InP->ferrule->fiber->cable vertical), FN Fabrinet (NVDA sole-source 1.6T assembly), and Taiwan micro-caps 4979-TWO LuxNet / 3163-TWO Browave. Avoid paying full price for the switch-ASIC layer (AVGO ~86% merchant share is great but well-followed) and the China module names (300308-SZ Innolight, 300502-SZ Eoptolink) where US-export-control tail + access friction warrant a discount. The whole node is FUND-BULL x TECH-EXTENDED — thesis durable to 2027+, alpha is entry timing on pullbacks.", "spineChild": null, "parts": [{"id": "nf-spine-switch", "label": "Spine / Leaf Switches", "kind": "switch", "drill": true, "valuePct": 18, "valueUSD": null, "note": "Spine/leaf switches = the boxes + ASICs that move packets between racks. Broadcom owns ~86% of merchant switch silicon (Tomahawk 6, 102.4T); the real battle is system-level: white-box Tomahawk (Meta Minipack-4) vs Arista EOS-managed boxes vs NVDA vertically-integrated Spectrum. Switch silicon competes for the SAME scarce TSMC N3 capacity as GPUs. ESTIMATE basis: ~18% of networking-node value.", "companies": [{"ticker": "AVGO", "name": "Broadcom", "market": "US", "chainRole": "IP", "role": "Tomahawk/Jericho switch silicon (merchant)", "marketShare": "merchant switch-silicon #1", "moat": "Tomahawk roadmap + SerDes", "moatLevel": "high", "niche": false, "aiExposure": "AI scale-out switch silicon + custom ASIC", "contentValue": "high", "investmentAngle": "Owns the merchant switch-silicon standard"}, {"ticker": "MRVL", "name": "Marvell", "market": "US", "chainRole": "IP", "role": "Teralynx switch silicon + custom ASIC + DSP", "marketShare": "merchant #2 + cust <script>
const DATA = JSON.parse(document.getElementById('stack-data').textContent);
const NODES = DATA.nodes;
const ROOT = DATA.root || 'capex';

/* ---- kind → accent colour + simple glyph ---- */
const KIND = {
  building:'cyan', 'rack-rows':'cyan','tray-compute':'cyan', gpu:'cyan', die:'cyan', wafer:'cyan', transistor:'cyan',
  cpu:'violet', switch:'violet','tray-switch':'violet', network:'violet', nic:'violet', optics:'violet', laser:'pink', dsp:'violet', dci:'violet',
  memory:'gold', substrate:'grey', pcb:'grey', interposer:'teal', bond:'teal',
  power:'gold','tray-power':'gold', vrm:'gold', battery:'gold', transformer:'gold', switchgear:'gold', ups:'gold', grid:'gold', turbine:'gold', busbar:'gold',
  cooling:'teal', coldplate:'teal', cdu:'teal', chiller:'teal', tower:'teal', manifold:'teal', fluid:'teal',
  connector:'warm', cable:'warm', retimer:'warm', passive:'grey', frame:'grey', mgmt:'grey', shell:'grey', building2:'grey', land:'grey', civil:'grey',
  litho:'cyan', depo:'teal', etch:'pink', cmp:'gold', implant:'violet', inspect:'green', metal:'warm', package:'teal', dice:'gold', test:'green',
  channel:'cyan', gate:'gold', dielectric:'teal', epi:'violet', materials:'green', fiber:'teal',
  mask:'grey', software:'violet', storage:'gold', resist:'green', gas:'green', vacuum:'grey', ebeam:'green', doping:'violet'
};
const COL = {cyan:'var(--cyan)',gold:'var(--gold)',teal:'var(--teal)',violet:'var(--violet)',warm:'var(--warm)',grey:'var(--grey)',green:'var(--green)',pink:'var(--pink)'};
const RGB = {cyan:'57,225,255',gold:'255,206,84',teal:'63,214,199',violet:'169,139,255',warm:'255,159,67',grey:'125,141,176',green:'79,224,138',pink:'255,127,174'};
function partColor(p){ return KIND[p.kind] || 'cyan'; }

/* ---- moat ---- */
function moatKey(m){m=(m||'').toLowerCase(); if(m.includes('monopol')||m.includes('single-source')||m.includes('sole'))return'mono'; if(m.includes('duopol'))return'duo'; if(m.includes('oligopol'))return'oli'; return'frag';}
const MOATCOL={mono:'gold',duo:'warm',oli:'teal',frag:'grey'};
function moatWord(m){return {mono:'MONOPOLY',duo:(/single-source|sole/i.test(m)?'SINGLE-SRC':'DUOPOLY'),oli:'OLIGOPOLY',frag:'FRAGMENTED'}[moatKey(m)];}
function partGem(p){return (p.companies||[]).some(c=>c.niche);}
function partMoat(p){const ms=(p.companies||[]).map(c=>moatKey(c.moat)); if(ms.includes('mono'))return'mono';if(ms.includes('duo'))return'duo';if(ms.includes('oli'))return'oli';return'frag';}

/* ---- index: gems + search ---- */
const allGems=(()=>{const m={};Object.keys(NODES).forEach(nid=>{(NODES[nid].parts||[]).forEach(p=>{(p.companies||[]).forEach(c=>{if(c.niche){const cur=m[c.ticker];if(!cur||(c.investmentAngle||'').length>(cur.c.investmentAngle||'').length)m[c.ticker]={c,nid,partId:p.id};}});});});return Object.values(m).sort((a,b)=>a.c.ticker>b.c.ticker?1:-1);})();
const coIndex={};Object.keys(NODES).forEach(nid=>{(NODES[nid].parts||[]).forEach(p=>{(p.companies||[]).forEach(c=>{(coIndex[c.ticker]=coIndex[c.ticker]||[]).push({nid,partId:p.id,c,part:p});});});});

/* ---- state ---- */
let nav=[ROOT];           // drill path (node ids; co:TICKER / pt:partId for synthesized supplier views)
let overlay=false, gemsOpen=false, selPart=null;
function cur(){return nav[nav.length-1];}

/* ===== recursive company supply-graph (top-down: part → direct suppliers → their suppliers → raw materials) ===== */
const CGRAPH = DATA.companyGraph || {};
function coRec(tk){ return tk?CGRAPH[tk]:null; }
function coHasSuppliers(tk){ const r=coRec(tk); return !!(r&&r.suppliers&&r.suppliers.length); }
function coTicker(c){ return c.ticker || ('x-'+String(c.name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,22)); }
function coKind(c){ const s=((c&&(c.chainRole||c.supplies||c.role))||'').toLowerCase();
  if(/resin|foil|glass|gas|chemical|wafer|material|slurry|precursor|copper|silicon/.test(s))return'materials';
  if(/equipment|tool|scanner|litho|etch|deposition|bond|inspect|metrology/.test(s))return'inspect';
  if(/\bip\b|design|arm|license|eda/.test(s))return'cpu';
  if(/laminate|ccl|substrate|\bpcb\b/.test(s))return'pcb';
  if(/assembl|odm|integrat|osat/.test(s))return'tray-compute';
  if(/foundry|fab/.test(s))return'die'; return'component'; }
function coPseudoPart(c){ const tk=coTicker(c); return {id:'co:'+tk, label:(c.ticker?c.ticker+' · ':'')+(c.name||tk),
  kind:coKind(c), drill:coHasSuppliers(tk), note:c.supplies||c.role||'', cagr3yr:c.cagr3yr, raw:c.raw, companies:[c]}; }
function ensureCompanyNode(tk){ const key='co:'+tk; if(NODES[key])return key; const r=coRec(tk); if(!r)return null;
  NODES[key]={id:key,title:r.name||tk,layout:'stack',scaleLabel:r.cagr3yr||'',valueBasis:'est. 3-yr CAGR',
    tagline:r.role||'', narrative:r.nameLocal?('（'+r.nameLocal+'）'):'', investmentTakeaway:r.investmentAngle||'',
    spineChild:null, isCompany:true, profile:r, parts:(r.suppliers||[]).map(coPseudoPart), sources:['supplier graph']};
  return key; }
function directSuppliersOf(part){ const cos=part.companies||[];
  if(part.directSuppliers&&part.directSuppliers.length){ const set=new Set(part.directSuppliers);
    const d=cos.filter(c=>set.has(c.ticker)); if(d.length)return d; }
  return cos; }
function ensurePartNode(part){ const key='pt:'+part.id; if(NODES[key])return key;
  NODES[key]={id:key,title:part.label,layout:'stack',scaleLabel:part.cagr3yr||'',valueBasis:'direct suppliers',
    tagline:part.note||'', investmentTakeaway:part.investmentTakeaway||'', spineChild:null, isPartView:true,
    parts:directSuppliersOf(part).map(coPseudoPart), sources:[]}; return key; }
function drillThing(part){
  if(String(part.id).startsWith('co:')){ const tk=part.id.slice(3);
    if(coHasSuppliers(tk)){ ensureCompanyNode(tk); drill(part.id); } else selectPart(part); return; }
  if(part.drill && NODES[part.id]){ drill(part.id); return; }            // composite part → real sub-node
  if((part.companies||[]).length){ ensurePartNode(part); drill('pt:'+part.id); } else selectPart(part); // leaf → supplier view
}
function cagrColor(s){ if(!s)return null; const m=String(s).match(/-?\d+/); const n=m?parseInt(m[0]):0;
  if(n>=30)return'var(--green)'; if(n>=15)return'var(--teal)'; if(n>0)return'var(--warm)'; if(n<0)return'#ff6a5a'; return'var(--faint)'; }
function partCAGR(p){ return p.cagr3yr || (p.companies&&p.companies[0]&&p.companies[0].cagr3yr) || null; }

/* ---- value helpers ---- */
function fmtUSD(v){if(v==null)return'';const a=Math.abs(v);if(a>=1e12)return'$'+(v/1e12).toFixed(1)+'T';if(a>=1e9)return'$'+(v/1e9).toFixed(0)+'B';if(a>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(a>=1e3)return'$'+(v/1e3).toFixed(0)+'k';return'$'+v;}

/* =================== LAYOUT ENGINES (return cells in 1000x620) =================== */
const VW=1000, VH=620;
function lFlow(parts){const per=Math.min(6,parts.length),rows=Math.ceil(parts.length/per),pad=22,gap=12;
  const cw=(VW-2*pad-gap*(per-1))/per, ch=Math.min(210,(VH-150-40*(rows-1))/rows), y0=120;
  return parts.map((p,i)=>{const r=Math.floor(i/per),c=i%per;return{p,x:pad+c*(cw+gap),y:y0+r*(ch+40),w:cw,h:ch,flowIdx:i,flowPer:per,flowLast:i===parts.length-1,flowRowEnd:(c===per-1)};});}
function lStack(parts){const fx=250,fw=500,top=92,bottom=566,gap=6,n=parts.length,avail=bottom-top;
  const minH=Math.min(42,(avail-gap*(n-1))/n);
  const free=Math.max(0,avail-gap*(n-1)-minH*n);
  const tot=parts.reduce((s,p)=>s+Math.max(p.valuePct||0,0),0)||1;
  let y=top;return parts.map(p=>{const h=minH+free*(Math.max(p.valuePct||0,0)/tot);const cell={p,x:fx,y,w:fw,h};y+=h+gap;return cell;});}
function row(arr,b,out){if(!arr.length)return;const g=8,w=(b.w-g*(arr.length-1))/arr.length;arr.forEach((p,i)=>out.push({p,x:b.x+i*(w+g),y:b.y,w,h:b.h}));}
function col(arr,b,out){if(!arr.length)return;const g=8,h=(b.h-g*(arr.length-1))/arr.length;arr.forEach((p,i)=>out.push({p,x:b.x,y:b.y+i*(h+g),w:b.w,h}));}
function grid(arr,b,out){if(!arr.length)return;const cols=Math.ceil(Math.sqrt(arr.length)),rows=Math.ceil(arr.length/cols),g=8,w=(b.w-g*(cols-1))/cols,h=(b.h-g*(rows-1))/rows;arr.forEach((p,i)=>{const c=i%cols,r=Math.floor(i/cols);out.push({p,x:b.x+c*(w+g),y:b.y+r*(h+g),w,h});});}
function bucket(parts){const b={center:[],ring:[],edge:[],base:[],top:[],flank:[],interconnect:[],frame:[],left:[],right:[],bottom:[]};parts.forEach(p=>{(b[p.region]||b.ring).push(p);});return b;}
function lFloor(parts){const known=['left','center','right','bottom','frame'];
  const b=bucket(parts);const out=[];
  const leftover=parts.filter(p=>!known.includes(p.region));
  col(b.left,{x:40,y:108,w:196,h:430},out);
  grid(b.center,{x:280,y:(leftover.length?146:108),w:380,h:(leftover.length?392:430)},out);
  col(b.right,{x:704,y:108,w:196,h:430},out);
  row(b.bottom,{x:280,y:548,w:380,h:58},out);
  row(b.frame,{x:40,y:560,w:860,h:40},out);
  if(leftover.length) row(leftover,{x:280,y:100,w:380,h:38},out);
  return out;}
function lBoard(parts){const b=bucket(parts);const out=[];
  row(b.top,{x:150,y:80,w:700,h:64},out);
  grid(b.center,{x:350,y:200,w:300,h:190},out);
  const e=b.edge,half=Math.ceil(e.length/2);col(e.slice(0,half),{x:140,y:170,w:180,h:250},out);col(e.slice(half),{x:680,y:170,w:180,h:250},out);
  row(b.ring,{x:330,y:402,w:340,h:52},out);
  row(b.base,{x:150,y:470,w:700,h:62},out);
  return out;}
function lPackage(parts){const known=['base','interconnect','center','flank'];
  const b=bucket(parts);const out=[];
  const leftover=parts.filter(p=>!known.includes(p.region));
  row(b.base,{x:150,y:466,w:700,h:80},out);
  row(b.interconnect,{x:150,y:430,w:700,h:30},out);
  grid(b.center,{x:370,y:226,w:260,h:170},out);
  const f=b.flank,half=Math.ceil(f.length/2);col(f.slice(0,half),{x:150,y:206,w:190,h:214},out);col(f.slice(half),{x:660,y:206,w:190,h:214},out);
  if(leftover.length) row(leftover,{x:150,y:120,w:700,h:60},out);
  return out;}
function lCross(parts){const x=170,w=660,top=110,bottom=540,h=(bottom-top)/parts.length;
  return parts.map((p,i)=>({p,x,y:top+i*h,w,h:h-6}));}
const LAYOUTS={flow:lFlow,stack:lStack,floorplan:lFloor,board:lBoard,package:lPackage,crosssection:lCross};

/* =================== RENDER =================== */
function render(){
  const node=NODES[cur()];
  renderCrumbs(); renderHead(node);
  const scene=document.getElementById('scene');
  if(node.layout==='capex'){ scene.innerHTML=''; renderCapex(node,scene); renderSide(node); return; }
  const parts=node.parts||[];
  if(productView && ILLUS[node.id]){ scene.innerHTML=illusSVG(node); }
  else { scene.innerHTML=sceneSVG(node, (LAYOUTS[node.layout]||lStack)(parts)); }
  // wire clicks (shared by schematic cells and product-view callouts) — recursive top-down drill
  scene.querySelectorAll('.cell').forEach(g=>{const pid=g.dataset.pid;const part=parts.find(p=>p.id===pid);
    g.addEventListener('click',()=>drillThing(part));});
  renderSide(node);
}
function renderHead(node){
  document.getElementById('stageHead').innerHTML=`
   <div class="sh-top"><div class="sh-title">${node.title}</div>
     ${node.scaleLabel?`<div class="sh-scale">${node.scaleLabel}${node.valueBasis?`<span class="bs">${node.valueBasis}</span>`:''}</div>`:''}</div>
   ${node.tagline?`<div class="sh-tag">▸ ${esc(node.tagline)}</div>`:''}
   <div class="sh-hint">${node.layout==='capex'?'tap to enter a data center':node.layout==='flow'?'the process, left → right · tap a step for its toolmakers · ◆ = hidden monopoly':'tap any part — solid = go deeper, outline = see its suppliers · ◆ = hidden monopoly'}</div>`;
}
function renderCrumbs(){const el=document.getElementById('crumbs');el.innerHTML='';
  nav.forEach((id,i)=>{const n=NODES[id];const c=document.createElement('span');c.className='crumb'+(i===nav.length-1?' here':'');
    c.innerHTML=`<span class="lv">L${i}</span>${n?n.title:id}`;c.onclick=()=>{nav=nav.slice(0,i+1);selPart=null;gemsOpen=false;syncGems();render();};el.appendChild(c);
    if(i<nav.length-1){const s=document.createElement('span');s.className='sep';s.textContent='›';el.appendChild(s);}});}

function sceneSVG(node,cells){
  let inner='';
  // frame for stack/board/package
  if(node.layout==='stack'){inner+=`<rect x="238" y="80" width="524" height="500" rx="12" fill="rgba(13,19,34,.4)" stroke="var(--line2)"/><text class="framelbl" x="250" y="72" font-size="11" letter-spacing="2">${esc((node.title||'').toUpperCase())}</text>`;}
  if(node.layout==='board'){inner+=`<rect x="120" y="64" width="760" height="492" rx="14" fill="rgba(12,28,48,.35)" stroke="rgba(57,225,255,.3)"/><text class="framelbl" x="134" y="56" font-size="11" letter-spacing="2">VERA RUBIN COMPUTE BOARD</text>`;}
  if(node.layout==='package'){inner+=`<rect x="140" y="190" width="720" height="368" rx="10" fill="rgba(63,214,199,.05)" stroke="rgba(63,214,199,.3)"/><text class="framelbl" x="150" y="180" font-size="11" letter-spacing="2">CoWoS PACKAGE</text>`;}
  if(node.layout==='floorplan'){inner+=`<rect x="20" y="92" width="900" height="520" rx="14" fill="rgba(13,19,34,.4)" stroke="var(--line2)"/><text class="framelbl" x="34" y="84" font-size="11" letter-spacing="2">AI DATA CENTER · CAMPUS PLAN</text>`;}
  if(node.layout==='crosssection'){inner+=`<text class="framelbl" x="170" y="98" font-size="11" letter-spacing="2">DIE CROSS-SECTION · top → bottom</text>`;}
  // flow arrows
  if(node.layout==='flow'){cells.forEach(c=>{ if(!c.flowLast && !c.flowRowEnd){const ax=c.x+c.w,ay=c.y+c.h/2;inner+=`<path class="arrow" d="M${ax} ${ay} L${ax+12} ${ay}"/>`;} });}
  cells.forEach(c=>{inner+=cellSVG(c,node);});
  return `<svg class="stage-svg" viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="xMidYMid meet"><defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="var(--line2)"/></marker></defs>${inner}</svg>`;
}
function cagrShort(s){ s=String(s||''); const m=s.match(/[~+]?\s*\d+\s*[-–]\s*\d+\s*%|[~+]?\s*\d+\s*%/); return m?m[0].replace(/\s+/g,''):clip(s,9); }
function wrapText(s, maxChars, maxLines){
  const words=String(s||'').replace(/\s+/g,' ').trim().split(' '); const lines=[]; let cur='';
  for(let i=0;i<words.length;i++){ const w=words[i];
    if(!cur){cur=w;}
    else if((cur+' '+w).length<=maxChars){cur+=' '+w;}
    else { lines.push(cur); cur=w;
      if(lines.length===maxLines-1){ let rest=words.slice(i).join(' '); if(rest.length>maxChars) rest=rest.slice(0,maxChars-1)+'…'; lines.push(rest); return lines; } }
  }
  if(cur) lines.push(cur);
  return lines.slice(0,maxLines);
}
function cellSVG(c,node){
  const p=c.p; const ck=overlay?MOATCOL[partMoat(p)]:partColor(p); const rgb=RGB[ck]||RGB.cyan; const col=COL[ck]||COL.cyan;
  const gem=partGem(p); const drillable=p.drill && NODES[p.id];
  const small=c.h<70||c.w<120;
  const cos=(p.companies||[]).slice(0,3).map(x=>x.ticker).join(' · ');
  const fa=gem?`rgba(255,206,84,.12)`:`rgba(${rgb},.13)`, fb=gem?`rgba(120,90,20,.10)`:`rgba(${rgb},.04)`;
  const edge=gem?'var(--gold)':col;
  const sel=selPart&&selPart.id===p.id;
  const _cg=partCAGR(p);
  const lx=c.x+12, lyTitle=c.y+(_cg?(small?17:21):(small?c.h/2+4:24)), lyCagr=c.y+(small?33:39), lyVal=c.y+c.h-(small?8:24), lyCo=c.y+c.h-8;
  const cid='c_'+String(p.id).replace(/[^a-zA-Z0-9_-]/g,'');
  const maxC=Math.max(6,Math.floor((c.w-22-(gem?14:0))/(small?6.2:7.6)));
  let inner=`<rect class="cface" x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" rx="8" fill="url(#cg_${cid})" stroke="${gem?'var(--golddeep)':`rgba(${rgb},.5)`}" stroke-width="1.2" ${drillable?'':'stroke-dasharray="5 4"'}/>`;
  inner+=`<text class="clabel" x="${lx}" y="${lyTitle}" font-size="${small?12:14}" fill="${gem?'var(--gold)':col}">${esc(clip(p.label,maxC))}</text>`;
  // CAGR — its own line directly below the name (so names are never truncated), no arrows
  if(_cg) inner+=`<text x="${lx}" y="${lyCagr}" font-family="var(--mono)" font-size="${small?9.5:11}" font-weight="700" fill="${cagrColor(_cg)}">${esc(cagrShort(_cg))}<tspan font-size="8" fill="var(--faint)" font-weight="400"> CAGR</tspan></text>`;
  if(!small && c.h>=84 && p.note){
    const noteTop=(_cg?lyCagr:lyTitle)+16;
    const noteBottom=(p.valuePct!=null? lyVal-12 : c.y+c.h-12);
    const maxLines=Math.max(1,Math.min(6,Math.floor((noteBottom-noteTop)/12.5)));
    const maxChars=Math.max(10,Math.floor((c.w-24)/5.3));
    const lines=wrapText(String(p.note),maxChars,maxLines);
    inner+=`<text x="${lx}" y="${noteTop}" font-size="10" fill="var(--dim)">`+lines.map((ln,i)=>`<tspan x="${lx}" dy="${i?12.5:0}">${esc(ln)}</tspan>`).join('')+`</text>`;
  }
  if(!small){
    if(p.valuePct===0) inner+=`<text class="cpct" x="${lx}" y="${lyVal}" font-size="11" fill="var(--faint)">⊂ subset · counted above</text>`;
    else if(p.valuePct!=null) inner+=`<text class="cpct" x="${lx}" y="${lyVal}" font-size="15" fill="${col}">${p.valuePct}%${p.valueUSD?` <tspan font-size="10" fill="var(--faint)">${fmtUSD(p.valueUSD)}</tspan>`:''}</text>`;
    if(cos) inner+=`<text class="cco" x="${lx}" y="${lyCo}" font-size="9.5">${esc(clip(cos,maxC+4))}</text>`;
  }
  if(gem) inner+=`<text class="gemstar" x="${c.x+c.w-15}" y="${c.y+16}" font-size="13">◆</text>`;
  if(drillable && !small) inner+=`<text class="cdrill" x="${c.x+c.w-12}" y="${c.y+c.h-9}" font-size="9" text-anchor="end" fill="${col}">GO INSIDE ⤢</text>`;
  let g=`<g class="cell${sel?' sel':''}${p.valuePct===0?' overlay':''}" data-pid="${esc(p.id)}">`;
  g+=`<defs><clipPath id="clip_${cid}"><rect x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" rx="8"/></clipPath>`;
  g+=`<linearGradient id="cg_${cid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${fa}"/><stop offset="1" stop-color="${fb}"/></linearGradient></defs>`;
  g+=`<rect class="ring" x="${c.x-2}" y="${c.y-2}" width="${c.w+4}" height="${c.h+4}" rx="9" stroke="${edge}"/>`;
  g+=`<g clip-path="url(#clip_${cid})">${inner}</g>`;
  g+=`</g>`;
  return g;
}

function renderCapex(node,scene){
  const part=(node.parts||[])[0];
  const sp=node.spenders||[];
  const cap=document.createElement('div');cap.className='capex';
  let bars='';
  if(sp.length){const vals=sp.map(c=>parseFloat(String(c.capex||'').replace(/[^0-9.]/g,''))||1);const mx=Math.max(...vals);
    bars=`<div class="caplbl">who's deploying it · 2026E capex</div><div class="bars">`+sp.map((c,i)=>
      `<div class="bar" title="${esc(c.name||'')}${c.note?' — '+esc(c.note):''}"><div class="bval">${esc(c.capex||'')}</div><div class="b" style="height:${26+120*vals[i]/mx}px"></div><div class="tk">${esc(c.ticker)}</div></div>`).join('')+`</div>
      <div class="caphint">↑ these are the SPENDERS (demand) · everything you drill into below is the SUPPLY CHAIN that captures it</div>`;}
  cap.innerHTML=`<div class="big">${esc(node.scaleLabel||'~$710B')}</div><div class="lbl">${esc(node.valueBasis||'')}</div>${bars}
    <div class="enter" id="enterDC">↓ FOLLOW IT INTO ONE AI DATA CENTER</div>`;
  scene.appendChild(cap);
  document.getElementById('enterDC').onclick=()=>{ if(part&&NODES[part.id]) drill(part.id); };

/* =================== SIDE PANEL =================== */
function renderSide(node){
  const side=document.getElementById('side');
  if(gemsOpen){side.innerHTML=gemsHTML();wireGemRows(side);return;}
  if(selPart){renderPartDetail(node,selPart);return;}
  let h=`<div class="sb-h">This level</div><div class="ptitle">${esc(node.title)}</div>
    ${node.scaleLabel?`<div class="pscale">${esc(node.scaleLabel)}${node.valueBasis?' · '+esc(node.valueBasis):''}</div>`:''}
    ${node.tagline?`<div class="ptag">▸ ${esc(node.tagline)}</div>`:''}
    ${node.narrative?`<div class="pdesc">${esc(node.narrative)}</div>`:''}
    ${node.investmentTakeaway?`<div class="take">${boldify(esc(node.investmentTakeaway))}</div>`:''}`;
  if(node.spineChild&&NODES[node.spineChild]) h+=`<div class="drill" id="descend">↓ DESCEND · ${esc(NODES[node.spineChild].title)}</div>`;
  // MECE parts list
  const parts=node.parts||[];
  if(parts.length){const gemN=parts.filter(partGem).length; const hasSub=parts.some(p=>p.valuePct===0);
    h+=`<div class="sb-h" style="margin-top:16px">${parts.length} parts${gemN?` · ${gemN} ◆`:''} · what each is + what drives it</div>`+
      parts.map(p=>{const t=p.trend||{}; const cg=partCAGR(p); const drillable=(p.drill&&NODES[p.id])||(p.companies||[]).length;
        return `<div class="prow${partGem(p)?' gem':''}" data-pid="${esc(p.id)}">
        <div class="prow-h"><span class="prow-lab">${partGem(p)?'◆ ':''}${esc(p.label)}</span><span class="prow-meta">${p.valuePct!=null&&p.valuePct!==0?p.valuePct+'%':p.valuePct===0?'⊂':''}${cg?` <b style="color:${cagrColor(cg)}">${esc(cagrShort(cg))}</b>`:''}</span></div>
        ${p.note?`<div class="prow-what">${esc(p.note)}</div>`:''}
        ${t.driver?`<div class="prow-drv"><span>▲ what drives its growth</span>${esc(t.driver)}</div>`:''}
        ${drillable?`<div class="prow-go">↓ ${String(p.id).startsWith('co:')?'its suppliers':'suppliers / go inside'} ⤢</div>`:''}</div>`;}).join('');}
  if(node.sources&&node.sources.length) h+=`<div class="src">${node.sources.map(s=>'· '+esc(s)).join('<br>')}</div>`;
  side.innerHTML=h;
  const d=document.getElementById('descend');if(d)d.onclick=()=>drill(node.spineChild);
  side.querySelectorAll('.prow[data-pid]').forEach(r=>{const p=parts.find(x=>x.id===r.dataset.pid);
    r.onclick=()=>drillThing(p);});
}
function renderPartDetail(node,p){
  const side=document.getElementById('side');const gem=partGem(p);const drillable=p.drill&&NODES[p.id];
  const gems=(p.companies||[]).filter(c=>c.niche),others=(p.companies||[]).filter(c=>!c.niche);
  side.innerHTML=`<div class="sb-h" style="cursor:pointer" id="backToNode">‹ ${esc(node.title)}</div>
    <div class="ptitle" style="color:${gem?'var(--gold)':'var(--cyan)'}">${esc(p.label)}</div>
    ${p.valuePct===0?`<span class="ppct">⊂ subset — already counted inside another slice (a lens, not additive)</span>`:p.valuePct!=null?`<span class="ppct">${p.valuePct}% of ${esc(node.title)}${p.valueUSD?' · '+fmtUSD(p.valueUSD):''}</span>`:''}
    ${p.note?`<div class="pdesc">${esc(p.note)}</div>`:''}
    ${(partCAGR(p)||p.trend)?`<div class="momentum"><span class="mo-arrow" style="color:${cagrColor(partCAGR(p))||trendColor(p.trend)};font-size:${partCAGR(p)?'16px':'22px'}">${esc(partCAGR(p)||(p.trend&&p.trend.dir)||'')}</span><div><div class="mo-lbl">${partCAGR(p)?'estimated 3-yr CAGR':'momentum'}</div>${p.trend&&p.trend.driver?`<div class="mo-driver">${esc(p.trend.driver)}</div>`:(p.trend&&p.trend.rate?`<div class="mo-rate">${esc(p.trend.rate)}</div>`:'')}</div></div>`:''}
    ${drillable?`<div class="drill" id="goIn">↓ GO INSIDE · ${esc(NODES[p.id].title)}</div>`:''}
    <div class="sb-h" style="margin-top:16px">${String(p.id).startsWith('co:')?(p.raw?'Raw material · end of chain':'Company'):'Direct suppliers · '+(p.companies||[]).length}</div>
    ${renderCompanies(p.companies||[])}`;
  document.getElementById('backToNode').onclick=()=>{selPart=null;render();};
  const gi=document.getElementById('goIn');if(gi)gi.onclick=()=>drill(p.id);

const CHAINORDER=['IP','material','laminate','fabrication','foundry','component','equipment','assembly','integration'];
const CHAINMETA={IP:['IP / Design','var(--gold)'],material:['Raw Materials','var(--green)'],laminate:['Laminate / CCL','var(--teal)'],fabrication:['Fabrication','var(--cyan)'],foundry:['Foundry','var(--cyan)'],component:['Component Maker','var(--cyan)'],equipment:['Equipment','var(--violet)'],assembly:['Assembly / Packaging','var(--warm)'],integration:['Integration / ODM','var(--warm)']};
function renderCompanies(companies){
  if(!companies.length) return '<div class="pdesc" style="color:var(--faint)">— end of chain / raw material —</div>';
  const g=companies.filter(c=>c.niche),o=companies.filter(c=>!c.niche);
  return g.map(coCard).join('')+o.map(coCard).join('');
}
function coCard(c){const mk=moatKey(c.moat);
  return `<div class="co${c.niche?' gem':''}"><div class="co-h"><span class="tk">${esc(c.ticker)}</span>
    ${c.market?`<span class="mkt">${esc(c.market)}</span>`:''}${c.chainRole?`<span class="crole">${esc(c.chainRole)}</span>`:''}<span class="nm">${esc(c.name||'')}</span></div>
    ${c.nameLocal?`<div class="nml">${esc(c.nameLocal)}</div>`:''}
    ${c.role?`<div class="role">${esc(c.role)}</div>`:''}
    <div class="stats">${c.marketShare?`<div class="st"><b>share</b>${esc(c.marketShare)}</div>`:''}
      ${c.moat?`<div class="st"><b>moat</b><span class="m-${mk}">${moatWord(c.moat)}</span></div>`:''}
      ${c.aiExposure?`<div class="st"><b>AI</b>${esc(c.aiExposure)}</div>`:''}

    ${c.investmentAngle?`<div class="angle"><span>${c.niche?'◆ what consensus misses':'angle'}</span>${esc(c.investmentAngle)}</div>`:''}</div>`;}

    <div class="g-pth">${esc(NODES[g.nid]?NODES[g.nid].title:g.nid)}</div></div></div>`).join('')}`;}
function wireGemRows(scope){scope.querySelectorAll('.gem-row[data-nid]').forEach(r=>{r.onclick=()=>{const nid=r.dataset.nid,pid=r.dataset.pid;

/* =================== NAV =================== */
function drill(id){if(!NODES[id])return;nav.push(id);selPart=null;gemsOpen=false;syncGems();render();scrollTop();}
function navTo(id){ // jump to a node: build a path via spine if possible else just [root,id]
  const path=spinePath(id); nav=path; selPart=null; gemsOpen=false; syncGems(); render(); scrollTop();}
function spinePath(id){ // walk parents by scanning who lists id as a drill part
  const parentOf={};Object.keys(NODES).forEach(nid=>{(NODES[nid].parts||[]).forEach(p=>{if(p.drill&&p.id&&NODES[p.id])parentOf[p.id]=nid;});});
  const path=[id];let g=id,guard=0;while(parentOf[g]&&guard++<20){g=parentOf[g];path.unshift(g);}if(path[0]!==ROOT)path.unshift(ROOT);return [...new Set(path)];}
function selectPart(p){selPart=p;
  // highlight the cell
  document.querySelectorAll('.cell').forEach(g=>{g.classList.toggle('sel',g.dataset.pid===p.id);g.classList.toggle('dim',g.dataset.pid!==p.id);});
  renderPartDetail(NODES[cur()],p);scrollTop();}
function scrollTop(){if(window.innerWidth<=880)window.scrollTo(0,0);}

document.getElementById('overlayBtn').onclick=function(){overlay=!overlay;this.classList.toggle('on',overlay);selPart=null;render();};
function syncGems(){document.getElementById('gemsBtn').classList.toggle('on',gemsOpen);}
document.getElementById('gemsBtn').onclick=function(){gemsOpen=!gemsOpen;syncGems();renderSide(NODES[cur()]);if(gemsOpen&&window.innerWidth<=880)setTimeout(()=>document.querySelector('.side').scrollIntoView({behavior:'smooth'}),60);};
document.getElementById('gemsCount').textContent=`💎 ${allGems.length} GEMS`;
document.getElementById('snap').textContent=(DATA.meta&&(DATA.meta.snapshot||DATA.meta.snapshotDate))||'JUN 2026';

document.getElementById('legend').innerHTML=[['cyan','compute/logic'],['gold','memory/power'],['teal','cooling/interposer'],['violet','network/CPU'],['warm','interconnect'],['grey','board/shell']]
  .map(([k,l])=>`<span class="lg"><span class="sw" style="background:${COL[k]}"></span>${l}</span>`).join('')+`<span class="lg"><span style="color:var(--gold)">◆</span> hidden monopoly</span><span class="lg" style="color:var(--faint)">dashed = supplier leaf · solid = drill deeper</span>`;

/* search */
const si=document.getElementById('search'),sr=document.getElementById('searchResults');
si.oninput=function(){const q=this.value.trim().toLowerCase();if(q.length<2){sr.classList.remove('show');return;}
  const seen={},res=[];Object.keys(coIndex).forEach(tk=>{coIndex[tk].forEach(x=>{const hay=(tk+' '+(x.c.name||'')+' '+(x.c.role||'')).toLowerCase();if(hay.includes(q)){const k=tk+'@'+x.nid+x.partId;if(!seen[k]){seen[k]=1;res.push({tk,nm:x.c.name,nid:x.nid,pid:x.partId,niche:x.c.niche});}}});});
  Object.keys(NODES).forEach(nid=>{if((NODES[nid].title||'').toLowerCase().includes(q))res.push({node:1,tk:'▣',nm:NODES[nid].title,nid});(NODES[nid].parts||[]).forEach(p=>{if((p.label||'').toLowerCase().includes(q))res.push({part:1,tk:'▸',nm:p.label,nid,pid:p.id});});});
  sr.innerHTML=res.slice(0,28).map(r=>`<div class="sr" data-nid="${r.nid}" ${r.pid?`data-pid="${esc(r.pid)}"`:''} ${r.tk&&!r.node&&!r.part?`data-tk="${esc(r.tk)}"`:''}>
    <span class="tk" style="${r.niche?'color:var(--gold)':''}">${esc(r.tk)}</span><span class="nm">${esc(r.nm||'')}</span>
    <span class="pth">${esc(NODES[r.nid]?NODES[r.nid].title:'')}</span></div>`).join('')||'<div class="sr"><span class="nm" style="color:var(--faint)">no match</span></div>';
  sr.classList.add('show');
  sr.querySelectorAll('.sr[data-nid]').forEach(el=>{el.onclick=()=>{sr.classList.remove('show');si.value='';navTo(el.dataset.nid);if(el.dataset.pid){const p=(NODES[el.dataset.nid].parts||[]).find(x=>x.id===el.dataset.pid);if(p)selectPart(p);}};});};
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sr.classList.remove('show');});
document.addEventListener('keydown',e=>{if(e.target===si){if(e.key==='Escape'){si.blur();sr.classList.remove('show');}return;}if(e.key==='ArrowLeft'||e.key==='Escape'){if(nav.length>1){nav.pop();selPart=null;render();}}});
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>render(),150);});

function calloutBox(p,x,y,w,h){
  const gem=partGem(p); const col=gem?'var(--gold)':COL[partColor(p)]; const drill=p.drill&&NODES[p.id];
  const tr=p.trend; const arrow=tr?tr.dir:''; const acol=trendColor(tr);
  return `<g class="cell${selPart&&selPart.id===p.id?' sel':''}" data-pid="${esc(p.id)}">
    <rect class="ring" x="${x-2}" y="${y-2}" width="${w+4}" height="${h+4}" rx="8" stroke="${gem?'var(--gold)':col}"/>
    <rect class="cface" x="${x}" y="${y}" width="${w}" height="${h}" rx="7" fill="rgba(11,18,34,.92)" stroke="${gem?'var(--golddeep)':'rgba(57,225,255,.4)'}" stroke-width="1.1" ${drill?'':'stroke-dasharray="4 4"'}/>
    <text x="${x+10}" y="${y+18}" class="clabel" font-size="12" fill="${col}">${esc(clip(p.label,22))}${gem?' ◆':''}</text>
    <text x="${x+10}" y="${y+35}" class="cco" font-size="10" fill="var(--faint)">${p.valuePct!=null?(p.valuePct===0?'⊂ subset':p.valuePct+'%'):''}${arrow?`  <tspan fill="${acol}">${arrow} ${esc(clip(tr.rate||'',12))}</tspan>`:''}${drill?'  ⤢':''}</text>
  </g>`;
}
function illusSVG(node){
  const f=ILLUS[node.id]; const {bg,callouts}=f(node); const parts=node.parts||[];
  const used=new Set(callouts.map(c=>c.partId));
  // any parts without an explicit callout get appended to whichever column has room
  parts.forEach(p=>{ if(!used.has(p.id)) callouts.push({partId:p.id,ax:500,ay:300,side:callouts.filter(c=>c.side==='left').length<=callouts.filter(c=>c.side!=='left').length?'left':'right'}); });
  let inner=bg;
  const lw=198,lh=44;
  const place=(arr,xLabel,goRight)=>{const n=arr.length;const top=84,bot=566,step=(bot-top)/Math.max(n,1);
    arr.forEach((c,i)=>{const p=parts.find(x=>x.id===c.partId);if(!p)return;const ly=top+step*i+step/2;
      const lineX=goRight?xLabel+lw:xLabel;
      inner+=`<path class="leader" d="M${lineX} ${ly} L${c.ax} ${c.ay}"/><circle class="anchor" cx="${c.ax}" cy="${c.ay}" r="3.5"/>`;
      inner+=calloutBox(p,xLabel,ly-lh/2,lw,lh);});};
  place(callouts.filter(c=>c.side==='left'),12,true);
  place(callouts.filter(c=>c.side!=='left'),790,false);
  return `<svg class="stage-svg" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet">${inner}</svg>`;
}

    s+=`<rect x="430" y="384" width="160" height="40" rx="2" fill="rgba(255,206,84,.10)" stroke="rgba(255,206,84,.4)"/>`;for(let i=0;i<4;i++)s+=`<rect x="${436+i*38}" y="390" width="32" height="28" rx="2" fill="rgba(255,206,84,.2)"/>`;

    const pos=[[300,150],[510,150],[300,330],[510,330]];
    pos.forEach(([px,py])=>{s+=`<rect x="${px}" y="${py}" width="130" height="120" rx="4" fill="rgba(57,225,255,.13)" stroke="rgba(57,225,255,.6)"/><rect x="${px+18}" y="${py+34}" width="42" height="56" fill="rgba(57,225,255,.45)"/><rect x="${px+70}" y="${py+34}" width="42" height="56" fill="rgba(57,225,255,.45)"/>`;

      {partId:'tray-coldplate',ax:500,ay:94,side:'right'}]};},
  'rubin-gpu-package':(node)=>{let s=`<rect x="300" y="150" width="400" height="320" rx="10" fill="rgba(125,141,176,.10)" stroke="var(--line2)"/><text class="illuslbl" x="310" y="142" font-size="10" letter-spacing="1">RUBIN GPU PACKAGE · CoWoS top-down</text>`;
    s+=`<rect x="340" y="195" width="320" height="235" rx="6" fill="rgba(63,214,199,.10)" stroke="rgba(63,214,199,.45)"/>`;

    for(let i=0;i<4;i++){s+=`<rect x="356" y="${208+i*52}" width="60" height="42" fill="rgba(255,206,84,.5)" stroke="var(--gold)"/><rect x="584" y="${208+i*52}" width="60" height="42" fill="rgba(255,206,84,.5)" stroke="var(--gold)"/>`;}
    return {bg:s,callouts:[
      {partId:'gpu-die',ax:500,ay:312,side:'left'},{partId:'hbm4',ax:386,ay:255,side:'left'},

      {partId:'pkg-abf-substrate',ax:650,ay:455,side:'right'},{partId:'pkg-hybrid-bond',ax:614,ay:340,side:'right'}]};}
};
function trendColor(tr){if(!tr)return'var(--faint)';const d=tr.dir||'';if(d.includes('↑↑'))return'var(--green)';if(d.includes('↑'))return'var(--teal)';if(d.includes('↓↓'))return'var(--hot,#ff6a5a)';if(d.includes('↓'))return'var(--warm)';return'var(--faint)';}

/* utils */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function clip(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s;}
function boldify(s){return s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');}

render();
